<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- 
    stroke-dasharray="0 24" creates the dotted effect: 0 length dash, 24px gap.
    stroke-linecap="round" turns the 0-length dashes into perfect circles.
  -->
  <g fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0 24">
    <!-- Roof: Triangle shape -->
    <path d="M 120 216 L 256 80 L 392 216" />
    
    <!-- Main House Structure & Doorway -->
    <!-- Path traces: Left Eave -> Left Wall -> Bottom Left Floor -> Door Left -> Door Top -> Door Right -> Bottom Right Floor -> Right Wall -> Right Eave -->
    <path d="M 104 236 H 408 M 126 236 V 424 H 212 V 320 H 300 V 424 H 386 V 236" />
  </g>
</svg>
